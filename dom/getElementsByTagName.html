<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document getElementById</title>
    <script>
        console.log('getElementById');
        
    </script>
    <style>
        .black{
            background-color: black;
            color:white;
        }
    </style>
</head>
<body>
    <div id="myElement">This is the element with ID 'myElement'</div>
    <div class="container">
        <div id="box" class="box">This is a box</div>
        <div class="box">This is another box 2</div>
        <div class="box">This is a box 3</div>
        <button onclick="magic()">Click Me</button>
        <script>
            function magic() {
               let divs=document.getElementsByTagName('div');
               for(element of divs){
                element.classList.add('black');
                element.classList.remove('black');
               }
            }
        </script>
    </div>
</body>
</html>
