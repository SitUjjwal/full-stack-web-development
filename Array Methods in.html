<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Methods in JavaScript</title>
    <script>
        console.log("Array Methods in JavaScript");
        let arr = [1, 2, 3, 4, 5];
        console.log("Original Array:", arr);
        arr.push(6);
        console.log("After push:", arr);
        arr.pop(4);
        console.log("After pop:", arr);
        arr.shift(2);
        //unshift() – Add item at the beginning
        let fruits = ["apple", "banana", "mango"];
        for (let i = 0; i < fruits.length; i++) {
        console.log(fruits[i]);

        }
        //Using for...of loop:

        for (let fruit of fruits) {
            console.log(fruit);
        }
        //map() – Transform Array
        let numbers = [1, 2, 3];
        let doubled = numbers.map(num => num * 2);
            console.log(doubled[1]); // [2, 4, 6]
        
        //filter() – Filter Items
        let scores = [30, 50, 90, 20];
        let passed = scores.filter(score => score >= 50);
            console.log(passed); // [50, 90]

            //Other Useful Methods
            let names = ["Ali", "Sara", "John"];
console.log(names.includes("Sara")); // true
console.log(names.indexOf("John"));  // 2
console.log(names.join(" - "));      // Ali - Sara - John
    </script>
</head>
<body>
    Array Methods in JavaScript
</body>
</html>
