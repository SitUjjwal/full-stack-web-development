<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break and Continue</title>
    <script>
       for (let i = 0; i < 10; i++) {
    if (i === 5) {
        break; // exits the loop when i equals 5
    }
    console.log(i);
}
//
for (let i = 0; i < 10; i++) {
    if (i === 5) {
        break; // exits the loop when i equals 5
    }
    console.log(i);
}

// Continue example
for (let i = 0; i < 10; i++) {
    if (i % 2 === 0) {
        continue; // skips even numbers
    }
    console.log(i);
}
    </script>
</head>
<body>
    
</body>
</html>
